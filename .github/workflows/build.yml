name: Build RetroPlay

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retroplay-${{ matrix.target }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RetroPlay ${{ github.ref_name }}
          body: |
            ## RetroPlay ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux (Debian/Ubuntu) | `retroplay_*_amd64.deb` |
            | Linux (AppImage) | `retroplay_*_amd64.AppImage` |
            | macOS (Apple Silicon) | `RetroPlay_*_aarch64.dmg` |
            | macOS (Intel) | `RetroPlay_*_x64.dmg` |

            ### System Requirements

            - **Linux**: Ubuntu 22.04+, Debian 12+, Fedora 39+, or compatible distro with webkit2gtk 4.1
            - **macOS**: macOS 10.15 (Catalina) or later
          draft: true
          prerelease: false
          files: artifacts/**/*
